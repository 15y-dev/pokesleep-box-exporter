<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケモンスリープ ボックスビューア</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/handsontable/14.6.1/handsontable.full.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/handsontable/14.6.1/handsontable.full.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
    background: #f0f4f8;
    color: #333;
    min-height: 100vh;
    overflow: hidden;
  }
  header {
    background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    height: 52px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }
  header .info {
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    margin-left: auto;
  }
  #col-toggle-btn {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }
  #col-toggle-btn:hover { background: rgba(255,255,255,0.3); }
  #col-panel {
    display: none;
    position: fixed;
    top: 52px;
    right: 0;
    width: 280px;
    max-height: calc(100vh - 52px);
    overflow-y: auto;
    background: #fff;
    border-left: 1px solid #ddd;
    box-shadow: -4px 0 12px rgba(0,0,0,0.1);
    z-index: 9999;
    padding: 12px;
  }
  #col-panel.open { display: block; }
  #col-panel h3 {
    font-size: 14px;
    color: #333;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 2px solid #2ecc71;
  }
  #col-panel .col-actions {
    display: flex; gap: 8px; margin-bottom: 10px;
  }
  #col-panel .col-actions button {
    flex: 1; padding: 4px 8px; font-size: 12px;
    border: 1px solid #ccc; border-radius: 4px;
    background: #f5f5f5; cursor: pointer;
  }
  #col-panel .col-actions button:hover { background: #e0e0e0; }
  #col-panel label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  #col-panel label:hover { background: #f0f4f8; }
  #col-panel input[type="checkbox"] {
    accent-color: #2ecc71;
    width: 16px; height: 16px;
  }
  #drop-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: calc(100vh - 52px);
    border: 3px dashed #b0c4de;
    border-radius: 16px;
    margin: 24px;
    transition: all 0.3s;
    cursor: pointer;
    background: #fff;
  }
  #drop-zone.dragover {
    border-color: #2ecc71;
    background: rgba(46, 204, 113, 0.05);
  }
  #drop-zone .icon { font-size: 64px; margin-bottom: 16px; }
  #drop-zone .text { font-size: 18px; color: #666; }
  #drop-zone .sub { font-size: 13px; color: #999; margin-top: 8px; }
  #table-container {
    display: none;
    height: calc(100vh - 52px);
    width: 100vw;
  }
  /* Light theme for Handsontable */
  .handsontable { font-size: 13px; }
  .handsontable th {
    background: #e8f5e9 !important;
    color: #2e7d32 !important;
    font-weight: 600;
    border-color: #c8e6c9 !important;
  }
  .handsontable td {
    border-color: #e0e0e0 !important;
  }
  .handsontable tr:nth-child(even) td {
    background: #f9fbe7 !important;
  }
  .handsontable td.current,
  .handsontable td.area {
    background: #c8e6c9 !important;
  }
  .handsontable .ht__highlight {
    background: #e8f5e9 !important;
  }
  /* Column colors (light-friendly) */
  .col-name { color: #e65100 !important; font-weight: 700; }
  .col-skill { color: #1565c0 !important; }
  .col-ingredient { color: #2e7d32 !important; }
  .col-berry { color: #bf360c !important; }
  input[type="file"] { display: none; }
</style>
</head>
<body>

<header>
  <h1>🌙 ポケモンスリープ ボックスビューア</h1>
  <button id="col-toggle-btn" style="display:none" onclick="toggleColPanel()">📋 列の表示</button>
  <span class="info" id="status-text">CSVファイルをドラッグ＆ドロップしてください</span>
</header>
<div id="col-panel">
  <h3>表示する列</h3>
  <div class="col-actions">
    <button onclick="setAllCols(true)">すべて表示</button>
    <button onclick="setAllCols(false)">すべて非表示</button>
  </div>
  <div id="col-checkboxes"></div>
</div>

<div id="drop-zone">
  <div class="icon">📂</div>
  <div class="text">CSVファイルをここにドラッグ＆ドロップ</div>
  <div class="sub">またはクリックしてファイルを選択</div>
</div>
<input type="file" id="file-input" accept=".csv" />

<div id="table-container"></div>

<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const tableContainer = document.getElementById('table-container');
const statusText = document.getElementById('status-text');
let hot = null;
let allHeaders = [];
let allData = [];
let hiddenCols = new Set();

const COLUMN_STYLES = {
  'ポケモン名': 'col-name',
  'メインスキル': 'col-skill',
  'サブスキル1': 'col-skill', 'サブスキル2': 'col-skill', 'サブスキル3': 'col-skill',
  'サブスキル4': 'col-skill', 'サブスキル5': 'col-skill',
  '食材A': 'col-ingredient', '食材B': 'col-ingredient', '食材C': 'col-ingredient',
  'きのみ': 'col-berry',
};

const FREEZE_COLS = 2;

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) loadCSV(e.target.files[0]);
});
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.csv')) loadCSV(file);
  else alert('CSVファイルをドロップしてください');
});

function loadCSV(file) {
  Papa.parse(file, {
    header: true,
    encoding: 'UTF-8',
    skipEmptyLines: true,
    complete: function(results) {
      if (!results.data.length) { alert('データが空です'); return; }
      renderTable(results.meta.fields, results.data);
      statusText.textContent = `${file.name} — ${results.data.length}匹`;
    },
    error: function(err) { alert('CSV読み込みエラー: ' + err.message); }
  });
}

function renderTable(headers, data) {
  dropZone.style.display = 'none';
  tableContainer.style.display = 'block';
  document.getElementById('col-toggle-btn').style.display = '';

  allHeaders = headers;
  allData = data;
  hiddenCols = new Set();

  // Load saved hidden columns from localStorage
  try {
    const saved = JSON.parse(localStorage.getItem('pokesleep_hidden_cols') || '[]');
    saved.forEach(c => { if (headers.includes(c)) hiddenCols.add(c); });
  } catch(e) {}

  buildColPanel(headers);
  requestAnimationFrame(() => rebuildTable());
}

function toggleColPanel() {
  document.getElementById('col-panel').classList.toggle('open');
}

function buildColPanel(headers) {
  const container = document.getElementById('col-checkboxes');
  container.innerHTML = '';
  headers.forEach(h => {
    const label = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = !hiddenCols.has(h);
    cb.dataset.col = h;
    cb.addEventListener('change', () => {
      if (cb.checked) hiddenCols.delete(h);
      else hiddenCols.add(h);
      saveHiddenCols();
      rebuildTable();
    });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(h));
    container.appendChild(label);
  });
}

function setAllCols(show) {
  if (show) hiddenCols.clear();
  else {
    // Keep at least 図鑑No and ポケモン名 visible
    allHeaders.forEach(h => { if (h !== '図鑑No' && h !== 'ポケモン名') hiddenCols.add(h); });
  }
  saveHiddenCols();
  buildColPanel(allHeaders);
  rebuildTable();
}

function saveHiddenCols() {
  localStorage.setItem('pokesleep_hidden_cols', JSON.stringify([...hiddenCols]));
}

function rebuildTable() {
  const visHeaders = allHeaders.filter(h => !hiddenCols.has(h));
  const visData = allData.map(row => visHeaders.map(h => row[h] || ''));
  buildTable(visHeaders, allData, visData);
}

function buildTable(headers, data, tableData) {
  if (!tableData) tableData = data.map(row => headers.map(h => row[h] || ''));

  const colWidths = headers.map(h => {
    if (h === '個体ID') return 60;
    if (['図鑑No','Lv','性別','リボンランク'].includes(h)) return 50;
    if (['SP','げんき','メインスキルLv','進化回数'].includes(h)) return 55;
    if (['きのみSP','料理SP','スキルSP','最大所持数'].includes(h)) return 65;
    if (h === 'ポケモン名') return 110;
    if (h === 'メインスキル') return 140;
    if (h.startsWith('サブスキル')) return 130;
    if (h.startsWith('食材')) return 140;
    if (h === 'きのみ') return 90;
    if (h === 'せいかく') return 80;
    if (h === '出会った日') return 120;
    if (h === '出会ったフィールド') return 110;
    if (h === 'とくい') return 60;
    if (h === 'お気に入り') return 55;
    return 100;
  });

  const columns = headers.map((h, i) => {
    const col = { data: i, readOnly: true };
    if (['図鑑No','Lv','SP','げんき','メインスキルLv','きのみSP','料理SP','スキルSP','進化回数','最大所持数','リボンランク'].includes(h)) {
      col.type = 'numeric';
    }
    return col;
  });

  function cellRenderer(instance, td, row, col, prop, value, cellProperties) {
    Handsontable.renderers.TextRenderer.apply(this, arguments);
    const header = headers[col];
    const cls = COLUMN_STYLES[header];
    if (cls) td.classList.add(cls);
    if (header === 'とくい') {
      if (value === 'きのみ') { td.style.color = '#388e3c'; td.style.fontWeight = '700'; }
      else if (value === '食材') { td.style.color = '#e65100'; td.style.fontWeight = '700'; }
      else if (value === 'スキル') { td.style.color = '#1565c0'; td.style.fontWeight = '700'; }
    }
    if (header === 'お気に入り' && value === '★') {
      td.style.color = '#f9a825';
      td.style.fontSize = '16px';
      td.style.textAlign = 'center';
    }
  }

  if (hot) hot.destroy();

  const h = tableContainer.offsetHeight;
  const w = tableContainer.offsetWidth;

  hot = new Handsontable(tableContainer, {
    data: tableData,
    colHeaders: headers,
    columns: columns,
    colWidths: colWidths,
    rowHeaders: true,
    readOnly: true,
    fixedColumnsStart: FREEZE_COLS,
    columnSorting: true,
    manualColumnResize: true,
    stretchH: 'none',
    autoWrapRow: false,
    autoWrapCol: false,
    height: h,
    width: w,
    viewportColumnRenderingOffset: 50,
    cells: function(row, col) {
      return { renderer: cellRenderer };
    },
    licenseKey: 'non-commercial-and-evaluation',
  });

  window.addEventListener('resize', () => {
    if (!hot) return;
    hot.updateSettings({
      height: tableContainer.offsetHeight,
      width: tableContainer.offsetWidth,
    });
  });
}

document.body.addEventListener('dragover', (e) => e.preventDefault());
document.body.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.csv')) loadCSV(file);
});
</script>
</body>
</html>
